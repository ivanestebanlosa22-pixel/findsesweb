<!DOCTYPE html>
<html lang="es">
<head>
<link rel="stylesheet" href="assets/findses.css">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Página no encontrada · FINDSES</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@700;800;900&family=Sora:wght@300;400&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--void:#000000;--gold:#FF6A00;--gold-bright:#FF8533;--chrome:#F8FAFC;--chrome-dim:#9f9faa;--violet:#2563EB;--line:rgba(255,106,0,.16)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(900px 600px at 70% 0%,rgba(37,99,235,.14),transparent 60%),radial-gradient(800px 600px at 20% 100%,rgba(255,106,0,.10),transparent 55%),var(--void);
color:var(--chrome);font-family:'Sora',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased}
.wrap{max-width:560px;display:flex;flex-direction:column;align-items:center;gap:18px}
.code{font-family:'Saira Condensed';font-weight:900;font-size:clamp(110px,26vw,220px);line-height:.85;transform:skewX(-8deg);
background:linear-gradient(180deg,var(--gold-bright),var(--gold) 60%,#7a5208);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 60px rgba(255,106,0,.3)}
h1{font-family:'Saira Condensed';font-weight:800;text-transform:uppercase;font-size:clamp(22px,5vw,34px);letter-spacing:.02em;transform:skewX(-5deg)}
p{font-weight:300;color:var(--chrome-dim);line-height:1.6;max-width:42ch}
.btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.btn{font-family:'Saira Condensed';font-weight:800;text-transform:uppercase;letter-spacing:.05em;font-size:15px;text-decoration:none;border-radius:50px;padding:13px 28px;transform:skewX(-6deg);transition:transform .3s,box-shadow .3s}
.btn span{display:inline-block;transform:skewX(6deg)}
.btn.p{color:#0a0a0a;background:linear-gradient(180deg,var(--gold-bright),var(--gold))}
.btn.p:hover{transform:skewX(-6deg) translateY(-3px);box-shadow:0 16px 40px -16px rgba(255,106,0,.8)}
.btn.g{color:var(--gold);border:1px solid var(--line)}
.btn.g:hover{transform:skewX(-6deg) translateY(-3px);border-color:var(--gold)}
.eyebrow{font-family:'Space Mono';font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold)}
.nav .brand .nav-logo{width:34px;height:34px;border-radius:8px;object-fit:cover;flex-shrink:0;box-shadow:0 0 0 1px rgba(255,255,255,.1),0 4px 14px -4px rgba(37,99,235,.6)}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">FINDSES</div>
  <div class="code">404</div>
  <h1>Este hallazgo se escapó</h1>
  <p>La página que buscas no existe o se ha movido. Vuelve al inicio o explora el catálogo para encontrar lo que necesitas.</p>
  <div class="btns">
    <a class="btn p" href="/"><span>Volver al inicio</span></a>
    <a class="btn g" href="/catalogo.html"><span>Ver catálogo</span></a>
  </div>
</div>

<script src="assets/findses.js"></script>
</body>
</html>
