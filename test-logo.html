<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TEST logo</title>
<style>
  body{margin:0;background:#0A0F1F;color:#fff;font-family:sans-serif;padding:20px}
  #log{font-family:monospace;font-size:12px;white-space:pre-wrap;margin-top:20px}
  canvas{display:block;border:1px solid #444}
  img{max-width:200px;display:block;margin:10px 0}
</style>
</head>
<body>
<h2>Test logo bg-hero.png</h2>
<img src="assets/bg-hero.png" alt="logo" id="imgtest">
<canvas id="c" width="600" height="400"></canvas>
<div id="log"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const log = document.getElementById('log');
function msg(s){ log.textContent += s + '\n'; console.log(s); }

msg('1. THREE cargado: ' + (typeof THREE !== 'undefined'));
msg('2. Imagen src: ' + document.getElementById('imgtest').src);
msg('3. Imagen complete: ' + document.getElementById('imgtest').complete);

document.getElementById('imgtest').onload = function(){
  msg('4. Imagen cargada! ' + this.naturalWidth + 'x' + this.naturalHeight);
};

document.getElementById('imgtest').onerror = function(){
  msg('4. ERROR: la imagen NO carga');
};

if(typeof THREE === 'undefined'){
  msg('ERROR: THREE no esta definido. El CDN fallo.');
} else {
  msg('5. Creando escena Three.js...');
  try {
    const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
    renderer.setClearColor(0x0A0F1F, 1);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 600/400, 0.1, 100);
    camera.position.z = 5;

    msg('6. Cargando textura...');
    const loader = new THREE.TextureLoader();
    loader.load('assets/bg-hero.png',
      function(tex){
        msg('7. Textura cargada! ' + tex.image.width + 'x' + tex.image.height);
        const mat = new THREE.MeshBasicMaterial({map:tex, transparent:true});
        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(4,4), mat);
        scene.add(mesh);
        renderer.render(scene, camera);
        msg('8. Renderizado. Deberias ver el logo en el canvas de arriba.');
      },
      undefined,
      function(err){
        msg('7. ERROR cargando textura: ' + err);
      }
    );
  } catch(e){
    msg('ERROR: ' + e.message);
  }
}
</script>
</body>
</html>
