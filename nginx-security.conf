# ===== FINDSES · Configuración Nginx =====
# Usa este archivo si tu servidor es Nginx en lugar de Apache.
# Copia el contenido dentro del bloque server { } de tu configuración.

# -------------------------------------------------------------------
# REDIRECCIONES: URLs antiguas → nuevas URLs correctas
# -------------------------------------------------------------------
location = /privacy.html { return 301 /privacidad.html; }
location = /terms.html { return 301 /terminos.html; }
location = /disclaimer.html { return 301 /afiliados.html; }
location = /findses-3d.html { return 301 /index.html; }

# -------------------------------------------------------------------
# FORZAR HTTPS
# -------------------------------------------------------------------
if ($scheme != "https") {
    return 301 https://$host$request_uri;
}

# -------------------------------------------------------------------
# PÁGINA 404 PERSONALIZADA
# -------------------------------------------------------------------
error_page 404 /404.html;

# -------------------------------------------------------------------
# COMPRESIÓN GZIP
# -------------------------------------------------------------------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/html text/css text/javascript application/javascript application/json application/xml image/svg+xml font/ttf font/opentype;
gzip_min_length 256;
gzip_disable "msie6";

# -------------------------------------------------------------------
# CACHÉ DEL NAVEGADOR
# -------------------------------------------------------------------
location ~* \.(webp|jpg|jpeg|png|gif|ico|svg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}
location ~* \.(css|js)$ {
    expires 1M;
    add_header Cache-Control "public";
}
location ~* \.(woff2?|ttf|otf)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}
location ~* \.html$ {
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
}

# -------------------------------------------------------------------
# HEADERS DE SEGURIDAD (APLICAR A TODAS LAS RESPUESTAS)
# -------------------------------------------------------------------
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
add_header Cross-Origin-Resource-Policy "cross-origin" always;

# Content Security Policy (permite CDNs necesarios)
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

# HSTS (2 años, incluye subdominios, preload list)
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# -------------------------------------------------------------------
# BLOQUEAR ACCESO A ARCHIVOS SENSIBLES
# -------------------------------------------------------------------
location ~* \.(htaccess|htpasswd|log|sql|bak|config|env|py|php|zip)$ {
    deny all;
    return 403;
}

location ~ /\.(git|unlighthouse) {
    deny all;
    return 403;
}

# -------------------------------------------------------------------
# PREVENIR LISTADO DE DIRECTORIOS
# -------------------------------------------------------------------
autoindex off;

# -------------------------------------------------------------------
# CHARSET POR DEFECTO
# -------------------------------------------------------------------
charset utf-8;

# -------------------------------------------------------------------
# SECURITY.TXT
# -------------------------------------------------------------------
location = /.well-known/security.txt {
    default_type text/plain;
}
